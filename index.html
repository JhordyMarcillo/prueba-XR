<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador AR | Software Engineering</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        :root { --accent: #4f9cf9; --bg: #0b0e14; }
        body { margin: 0; background-color: var(--bg); font-family: 'Inter', sans-serif; color: white; }
        
        .dashboard { padding: 20px; display: flex; flex-direction: column; align-items: center; max-width: 600px; margin: auto; }
        
        .viewer-container { width: 100%; height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #161b22; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
        
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }
        
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <main class="dashboard">
        <header class="header">
            <h1>Proyecto AR | Ingeniería de Software</h1>
            <p style="color: #8b949e;">Mascota 3D interactiva</p>
        </header>

        <section class="viewer-container">
            <model-viewer 
                src="prueba.glb" 
                ar 
                ar-modes="webxr scene-viewer quick-look" 
                camera-controls 
                auto-rotate 
                shadow-intensity="1">
            </model-viewer>
        </section>

        <section class="controls">
            <a href="#" class="btn btn-primary" onclick="alert('Usa el botón de AR que aparece sobre el modelo para ver en tu entorno')">
                AR Nativo (Recomendado)
            </a>
            
            <a href="ar-live.html" class="btn btn-secondary">
                Modo Marcador (Hiro)
            </a>
        </section>
    </main>

</body>
</html>
