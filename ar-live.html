<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Final</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <style>
      body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; }
      #status { position: fixed; top: 10px; left: 10px; z-index: 1000; color: white; background: rgba(0,0,0,0.5); padding: 10px; }
      /* Forzamos al canvas de A-Frame a ocupar todo */
      .a-canvas { width: 100% !important; height: 100% !important; }
    </style>
  </head>
  <body>
    <div id="status">Iniciando cámara...</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; cameraParametersUrl: https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/camera_para.dat;"
    >
      <a-assets>
        <a-asset-item id="dragon" src="prueba.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity gltf-model="#dragon" scale="0.04 0.04 0.04"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      
      // EL TRUCO MAESTRO: Cuando el video carga, le aplicamos 'object-fit: cover'
      scene.addEventListener('arjs-video-loaded', () => {
        const video = document.querySelector('video');
        if (video) {
          video.style.objectFit = 'cover';
          video.style.width = '100vw';
          video.style.height = '100vh';
        }
        document.getElementById('status').textContent = 'Cámara lista, busca el Hiro.';
      });
    </script>
  </body>
</html>
