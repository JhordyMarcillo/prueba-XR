<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo de Ingeniería de Software en AR</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <main class="page">
      <section class="grid" id="viewer">
        <article class="panel panel--viewer">
          <h2>Modelo 3D</h2>
          <model-viewer
            id="modelViewer"
            src="prueba.glb"
            ar
            camera-controls
            auto-rotate
            shadow-intensity="1"
            style="width: 100%; height: 500px;"
          ></model-viewer>
        </article>
      </section>

      <section class="grid" id="qr">
        <article class="panel">
          <h2>Generar QR</h2>
          <input id="qrUrl" type="url" value="https://jhordymarcillo.github.io/prueba-XR/" />
          <button id="generateQr">Generar QR</button>
          <div id="qrCode"></div>
        </article>
      </section>
    </main>
  </body>
</html>
